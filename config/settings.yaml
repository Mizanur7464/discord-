# ============================================
#  News Trading Bot - Main Settings
#  Edit this file easily without touching code
# ============================================

bot:
  command_prefix: "!"
  auto_start: true

news:
  alert_all_news: true          # post every forwarded news to #alerts (including neutral)
  process_all_messages: false
  always_process_urls: false
  check_negation: true
  headline_only_bullish: true   # bullish keywords match headline only (not company intro)
  trusted_news_bots:           # bot usernames allowed to post in news channel (substring match)
    - nuntio
  ai_sentiment_enabled: true    # use OpenAI when keywords return neutral
  ai_on_neutral_only: true      # keep keyword rules first; AI fills gaps
  openai_model: gpt-4o-mini     # fast model for headline classification

  negation_words:
    - not
    - "no "
    - "n't"
    - never
    - without
    - despite
    - fail
    - failed
    - denies
    - denied
    - reject
    - rejected
    - cancel
    - cancelled
    - canceled
    - withdraw
    - against
    - unlikely
    - misses
    - missed

  allowed_url_domains:
    - news.nuntiobot.com
    - nuntiobot.com

  keywords:
    bullish:
      - partnership
      - collaboration
      - contract awarded
      - fda approval
      - approval
      - compliance
      - regains
      - regain
      - upgrade
      - pt raise
      - price target
      - ai partnership
      - ai collaboration
      - ai contract
      - patent
      - granted
      - blockchain
      - ev
    ignore:
      - offering
      - dilution
      - resignation
      - probe
      - delisting
      - stock split
      - miss
      - misses
      - missed
      - revenue down
      - bankruptcy
      - default

trading:
  enabled: true
  broker: alpaca
  default_symbol: ""
  trade_amount_usd: 100
  take_profit_percent: 30
  stop_loss_percent: 3
  max_trades_per_day: 15
  one_trade_per_symbol_per_day: true
  cancel_orders_on_bad_news: true
  block_saturday: true
  block_sunday: true
  block_monday_premarket: false
  regular_market_hours_only: false          # false = trade extended hours too
  extended_hours_trading: true             # Mon–Fri 4:00 AM–8:00 PM ET
  volume_filter_enabled: true
  min_volume_skip: 200000          # skip buy if daily volume below this
  low_volume_threshold: 1000000     # below = high risk, use reduced size
  low_volume_trade_amount_usd: 25   # buy amount for high-risk low-volume stocks

forwarder:
  enabled: true
  require_news_url: false   # forward posts with ticker even if link missing
