# ============================================
#  News Trading Bot - Main Settings
#  Edit this file easily without touching code
# ============================================

bot:
  command_prefix: "!"
  name: "Quantiqo"
  auto_start: true

news:
  alert_all_news: true          # post every forwarded news to #alerts (including neutral)
  process_all_messages: false
  always_process_urls: false
  trusted_news_bots:           # bot usernames allowed to post in news channel (substring match)
    - nuntio
  ai_sentiment_enabled: true    # all buy/ignore/neutral signals decided by OpenAI
  openai_model: gpt-4o-mini
  benzinga_feed_enabled: true   # licensed news from Benzinga API (replaces NB news)
  benzinga_poll_interval_seconds: 15   # poll Massive Benzinga news (was 20)
  reader_enabled: true           # serve paywall-free article pages from API cache
  reader_port: 8787

  allowed_url_domains:
    - news.nuntiobot.com
    - nuntiobot.com
    - benzinga.com
    - www.benzinga.com

trading:
  enabled: true
  broker: alpaca
  default_symbol: ""
  trade_amount_usd: 100
  take_profit_percent: 20
  stop_loss_percent: 3
  max_trades_per_day: 15
  one_trade_per_symbol_per_day: true
  cancel_orders_on_bad_news: true
  sell_position_on_bad_news: true       # market-sell open position on bad news (news abort)
  remove_watchlist_on_bad_news: true  # drop symbol from AI + historical watchlists
  block_saturday: true
  block_sunday: true
  block_monday_premarket: false
  regular_market_hours_only: false          # false = trade extended hours too
  extended_hours_trading: true             # Mon–Fri 4:00 AM–8:00 PM ET
  volume_filter_enabled: true
  min_volume_skip: 0               # 0 = never skip; low volume uses reduced size below
  low_volume_threshold: 1000000    # below = high risk, use reduced size
  low_volume_trade_amount_usd: 25  # buy amount for high-risk low-volume stocks
  extended_limit_buffer_percent: 2 # extended-hours buy limit = ask + this percent
  extended_quote_max_below_trade_percent: 10 # if quote is this far below latest trade, use latest trade price
  mosquito_volume_filter_enabled: true    # require recent mosquito money-flow/volume confirmation before buy
  mosquito_volume_min_value: 1000000      # min labeled mosquito volume value to count as confirmation
  mosquito_min_relative_volume: 2.0       # RVol confirmation from mosquito card
  mosquito_volume_confirm_minutes: 60     # volume confirmation stays valid for this many minutes
  mosquito_alerts_enabled: true           # post own scanner rows to #mosquito
  mosquito_alert_cooldown_seconds: 600   # per-symbol mosquito cooldown (10 min)
  mosquito_max_alerts_per_batch: 3       # top movers only each scan cycle
  mosquito_automute_window_seconds: 90   # SPM-style auto-mute rolling window
  mosquito_automute_max_alerts: 8        # max posts in window before mute
  mosquito_automute_duration_seconds: 180  # mute length when too noisy
  watchlist_alert_cooldown_seconds: 600    # per-symbol watchlist row cooldown (10 min)
  watchlist_max_alerts_per_batch: 3        # top setups per realtime scan cycle
  watchlist_automute_window_seconds: 90   # SPM-style watchlist auto-mute window
  watchlist_automute_max_alerts: 6        # max watchlist rows in window before mute
  watchlist_automute_duration_seconds: 180
  watchlist_mode_enabled: true            # AI bullish news first goes to watchlist, then waits for breakout
  watchlist_days: 3                       # keep AI-filtered symbols for this many days
  watchlist_volume_increase_percent: 20   # enter when mosquito volume rises this much from baseline
  watchlist_price_increase_percent: 3     # enter when mosquito price rises this much from baseline
  watchlist_max_entries: 2000             # max AI-news watchlist symbols
  historical_watchlist_max_entries: 2000  # repeat low-cap runner history cap
  historical_watchlist_retention_days: 90
  ai_exit_enabled: true                   # AI decides hold vs grid sell using volume context
  ai_exit_min_profit_percent: -5          # run AI exit when profit drops below this %
  grid_exit_flexible: true                # volume shifts grid tiers up/down
  grid_rvol_strong: 3.0                   # strong volume → hold for higher grid level
  grid_rvol_weak: 1.5                     # weak volume → sell at lower grid level
  grid_tier_adjust_percent: 10            # max % shift per grid tier
  semi_automated_mode: true               # scanner + alerts first; manual confirm before trade
  auto_trade_on_signal: false             # set true only if you want old fully-auto buy behavior
  scanner_min_alert_score: 50             # minimum score to flag as actionable alert
  scanner_min_rvol: 2.0                   # relative volume vs 30-day average
  scanner_min_daily_volume: 500000
  scanner_min_turnover_usd: 1000000         # price * daily volume proxy
  scanner_min_price: 0.5
  scanner_max_price: 20.0
  runner_big_move_percent: 50             # star repeat runners after big single-day moves
  runner_retention_days: 30
  intraday_bar_limit: 120                # 1-minute bars for multi-timeframe + pullback
  pullback_entry_percent: 3              # target pullback below recent high
  pullback_max_chase_percent: 2          # within this % of high = chasing
  pullback_limit_buffer_percent: 0.5
  pullback_lookback_bars: 30
  use_pullback_limit_orders: true       # /buy uses pullback limit instead of market
  scanner_profiles:
    premarket:
      min_price: 0.5
      max_price: 15.0
      min_rvol: 1.5
      min_gap_pct: 3.0
      min_session_change_pct: 2.0
      min_turnover_usd: 500000
      min_daily_volume: 300000
      min_alert_score: 45
    regular:
      min_price: 0.5
      max_price: 20.0
      min_rvol: 2.0
      min_gap_pct: 5.0
      min_session_change_pct: 3.0
      min_turnover_usd: 1000000
      min_daily_volume: 500000
      min_alert_score: 50
    afterhours:
      min_price: 0.5
      max_price: 15.0
      min_rvol: 1.8
      min_gap_pct: 0.0
      min_session_change_pct: 1.0
      min_turnover_usd: 750000
      min_daily_volume: 400000
      min_alert_score: 48

  exit_manager_enabled: true
  exit_tiers:                           # flexible profit grid — AI + volume can shift levels
    - profit_percent: 8
      sell_percent: 25
    - profit_percent: 15
      sell_percent: 30
    - profit_percent: 25
      sell_percent: 25
    - profit_percent: 40
      sell_percent: 20
  trailing_stop_percent: 5
  runner_hold_percent: 15
  realtime_scanner_enabled: true
  realtime_scan_interval_seconds: 30
  realtime_scan_alert_cooldown_seconds: 300
  benzinga_enabled: true
  microstructure_enabled: false
  data_provider: alpaca
  moomoo_host: 127.0.0.1
  moomoo_port: 11111
  ibkr_host: 127.0.0.1
  ibkr_port: 7497
  ibkr_client_id: 1
  universe_scanner_enabled: true
  universe_most_actives_top: 100
  universe_movers_top: 50
  realtime_max_symbols_per_cycle: 100
  realtime_batch_rotation: true         # rotate through full 2k watchlist in batches
  summary_interval_seconds: 60         # refresh top-gainer data
  summary_live_tick_seconds: 30        # edit same message for live clock
  summary_top_gainers_limit: 15        # SPM/NB style top movers only
  potential_enabled: true             # pre-gainer potential channel
  potential_min_score: 45
  potential_min_session_change_pct: 2
  potential_max_session_change_pct: 25  # skip names already extended
  potential_max_alerts_per_batch: 5
  potential_alert_cooldown_seconds: 900
  potential_retention_days: 5
  unusual_whales_enabled: false
  tradingview_enabled: false
  tradingview_exchange: NASDAQ
  tradingview_interval: 5m

forwarder:
  enabled: false   # NuntioBot forward off — use Benzinga feed
  require_news_url: false
